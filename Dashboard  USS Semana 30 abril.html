<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz Plan Comunicacional — USS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --uss-red: #C8102E;
    --uss-dark: #1A1A2E;
    --uss-gold: #E8B84B;
    --bg: #F4F2EE;
    --card: #FFFFFF;
    --border: #E2DDD8;
    --text: #1A1A2E;
    --muted: #7A7570;
    --completado: #1D7A4F;
    --completado-bg: #E8F5EE;
    --desarrollo: #B06A00;
    --desarrollo-bg: #FFF3E0;
    --pendiente: #C8102E;
    --pendiente-bg: #FEF0F2;
    --shadow: 0 2px 12px rgba(26,26,46,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--uss-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  .header-inner {
    display: flex;
    align-items: stretch;
    max-width: 1400px;
    margin: 0 auto;
  }

  .header-accent {
    width: 8px;
    background: var(--uss-red);
    flex-shrink: 0;
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    flex: 1;
    gap: 24px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-emblem {
    width: 44px;
    height: 44px;
    background: var(--uss-red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    color: white;
    font-size: 18px;
    letter-spacing: -1px;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%);
  }

  .header-titles h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.3px;
    line-height: 1.1;
  }

  .header-titles p {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .header-date {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    text-align: right;
    line-height: 1.6;
  }

  .header-date strong {
    display: block;
    font-size: 14px;
    color: var(--uss-gold);
    font-weight: 600;
  }

  /* ── KPI BAR ── */
  .kpi-bar {
    background: var(--uss-red);
    padding: 0;
  }

  .kpi-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    gap: 0;
  }

  .kpi-item {
    padding: 14px 28px 14px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    border-right: 1px solid rgba(255,255,255,0.2);
    margin-right: 28px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .kpi-item:last-child { border-right: none; margin-right: 0; }
  .kpi-item:hover { opacity: 0.8; }

  .kpi-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    line-height: 1;
  }

  .kpi-label {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    line-height: 1.4;
  }

  .kpi-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-right: 4px;
  }

  .filter-btn {
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--uss-red); color: var(--uss-red); }
  .filter-btn.active { background: var(--uss-dark); border-color: var(--uss-dark); color: white; }

  .search-box {
    margin-left: auto;
    position: relative;
  }

  .search-box input {
    padding: 8px 16px 8px 36px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--uss-red); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  /* ── EJE SECTIONS ── */
  .eje-section {
    margin-bottom: 32px;
  }

  .eje-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }

  .eje-stripe {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .eje-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .eje-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 12px;
  }

  .eje-toggle {
    font-size: 14px;
    color: var(--muted);
    transition: transform 0.3s;
  }

  .eje-toggle.collapsed { transform: rotate(-90deg); }

  /* ── TABLE ── */
  .table-wrapper {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--uss-dark);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
    white-space: nowrap;
  }

  th:first-child { padding-left: 20px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAF8F5; }

  td {
    padding: 12px 16px;
    vertical-align: middle;
    color: var(--text);
    line-height: 1.4;
  }

  td:first-child { padding-left: 20px; }

  td.action-cell {
    font-weight: 500;
  }

  td.date-cell {
    white-space: nowrap;
    color: var(--muted);
    font-size: 12px;
  }

  td.resp-cell {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .badge-completado { background: var(--completado-bg); color: var(--completado); }
  .badge-completado .badge-dot { background: var(--completado); }
  .badge-desarrollo { background: var(--desarrollo-bg); color: var(--desarrollo); }
  .badge-desarrollo .badge-dot { background: var(--desarrollo); }
  .badge-pendiente { background: var(--pendiente-bg); color: var(--pendiente); }
  .badge-pendiente .badge-dot { background: var(--pendiente); }
  .badge-default { background: #F0EDE9; color: var(--muted); }

  .tipo-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .tipo-ancla { background: #E8EFF8; color: #2A5BA8; }
  .tipo-ao { background: #F2E8F8; color: #7A2AB8; }
  .tipo-soporte { background: #E8F5EE; color: #1D7A4F; }

  /* ── STATUS EDIT ── */
  .status-select {
    appearance: none;
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 20px;
    outline: none;
    width: 100%;
  }

  .status-wrap {
    display: inline-block;
    border-radius: 20px;
    position: relative;
    min-width: 120px;
  }

  .status-wrap.completado { background: var(--completado-bg); color: var(--completado); }
  .status-wrap.desarrollo { background: var(--desarrollo-bg); color: var(--desarrollo); }
  .status-wrap.pendiente { background: var(--pendiente-bg); color: var(--pendiente); }
  .status-wrap.default { background: #F0EDE9; color: var(--muted); }

  .status-wrap select { color: inherit; }

  /* ── EDITABLE CELLS ── */
  .editable {
    outline: none;
    border-radius: 4px;
    transition: background 0.15s;
    min-width: 40px;
  }
  .editable:hover { background: rgba(200,16,46,0.05); }
  .editable:focus { background: rgba(200,16,46,0.08); box-shadow: 0 0 0 2px rgba(200,16,46,0.2); }

  /* ── ADD ROW ── */
  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    border: none;
    color: var(--uss-red);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    border-top: 1px dashed var(--border);
    transition: background 0.15s;
  }

  .add-row-btn:hover { background: var(--completado-bg); }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 48px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── PROGRESS BAR ── */
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--uss-red);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ── ACTION BUTTONS ── */
  .action-btn {
    background: var(--uss-red);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { background: #A80D26; transform: translateY(-1px); }

  .delete-btn {
    background: none;
    border: none;
    color: #CCC;
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .delete-btn:hover { color: var(--uss-red); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 16px;
    padding: 36px;
    width: 560px;
    max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-field.full { grid-column: 1 / -1; }

  .form-field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
  }

  .form-field input,
  .form-field select {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }

  .form-field input:focus,
  .form-field select:focus { border-color: var(--uss-red); }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 8px 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  /* ── PRINT / PRESENTATION ── */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 24px;
    justify-content: flex-end;
  }

  @media print {
    header { position: static; }
    .filters, .toolbar, .add-row-btn, .delete-btn { display: none !important; }
    .table-wrapper { box-shadow: none; border: 1px solid #DDD; }
    body { background: white; }
    main { padding: 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="header-accent"></div>
    <div class="header-content">
      <div class="logo-area">
        <div class="logo-emblem">USS</div>
        <div class="header-titles">
          <h1>Matriz Plan Comunicacional</h1>
          <p>Universidad San Sebastián &nbsp;·&nbsp; Dirección de Comunicaciones</p>
        </div>
      </div>
      <div class="header-date">
        <strong id="today-date"></strong>
        Semana de seguimiento
      </div>
    </div>
  </div>
</header>

<!-- KPI BAR -->
<div class="kpi-bar">
  <div class="kpi-inner" id="kpi-bar"></div>
</div>

<!-- MAIN -->
<main>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="action-btn" onclick="openModal()">+ Nueva acción</button>
    <button class="action-btn" style="background:var(--uss-dark)" onclick="window.print()">🖨 Imprimir</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">Filtrar:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('Pendiente', this)">Pendiente</button>
    <button class="filter-btn" onclick="setFilter('En desarrollo', this)">En desarrollo</button>
    <button class="filter-btn" onclick="setFilter('Completado', this)">Completado</button>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar acción o tema..." id="search-input" oninput="renderAll()">
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

</main>

<!-- ADD ROW MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Nueva acción comunicacional</h2>
    <div class="form-grid">
      <div class="form-field">
        <label>Eje</label>
        <select id="f-eje">
          <option>Orgullo USS</option>
          <option>Discusión País</option>
          <option>Salud</option>
          <option>Investigación</option>
          <option>Vinculación con el Medio</option>
        </select>
      </div>
      <div class="form-field">
        <label>Tipo de iniciativa</label>
        <select id="f-tipo">
          <option>Ancla</option>
          <option>AO</option>
          <option>Soporte</option>
        </select>
      </div>
      <div class="form-field full">
        <label>Tema</label>
        <input type="text" id="f-tema" placeholder="Nombre del tema o proyecto">
      </div>
      <div class="form-field full">
        <label>Acción</label>
        <input type="text" id="f-accion" placeholder="Descripción de la acción">
      </div>
      <div class="form-field">
        <label>Tipo de acción</label>
        <select id="f-tipo-accion">
          <option>Interna</option>
          <option>Externo</option>
          <option>Interno y Externo</option>
          <option>Interna-Externa</option>
        </select>
      </div>
      <div class="form-field">
        <label>Fecha</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="form-field">
        <label>Responsable</label>
        <input type="text" id="f-resp" placeholder="Nombre">
      </div>
      <div class="form-field">
        <label>Status</label>
        <select id="f-status">
          <option>Pendiente</option>
          <option>En desarrollo</option>
          <option>Completado</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="action-btn" onclick="addRow()">Agregar acción</button>
    </div>
  </div>
</div>

const EJE_COLORS = {
  'Orgullo USS': '#C8102E',
  'Discusión País': '#2A5BA8',
  'Salud': '#1D7A4F',
  'Investigación': '#7A2AB8',
  'Vinculación con el Medio': '#B06A00'
};

const EJES_ORDER = ['Orgullo USS', 'Discusión País', 'Salud', 'Investigación', 'Vinculación con el Medio'];

let currentFilter = 'all';
let collapsedEjes = {};

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getStatusClass(s) {
  if (!s) return 'default';
  if (s === 'Completado') return 'completado';
  if (s === 'En desarrollo') return 'desarrollo';
  if (s === 'Pendiente') return 'pendiente';
  return 'default';
}

function formatDate(d) {
  if (!d) return '—';
  try {
    const parts = d.split('-');
    if (parts.length !== 3) return d;
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
  } catch { return d; }
}

function getTipoBadge(tipo) {
  const cls = tipo === 'Ancla' ? 'tipo-ancla' : tipo === 'AO' ? 'tipo-ao' : 'tipo-soporte';
  return `<span class="tipo-badge ${cls}">${tipo || '—'}</span>`;
}

function renderKPIs() {
  const total = data.length;
  const completado = data.filter(r => r.status === 'Completado').length;
  const desarrollo = data.filter(r => r.status === 'En desarrollo').length;
  const pendiente = data.filter(r => r.status === 'Pendiente').length;
  const pct = total ? Math.round(completado / total * 100) : 0;

  const kpis = [
    { num: total, label: 'Acciones totales', dot: '#FFFFFF' },
    { num: completado, label: 'Completadas', dot: '#4ADE80' },
    { num: desarrollo, label: 'En desarrollo', dot: '#FCD34D' },
    { num: pendiente, label: 'Pendientes', dot: '#FCA5A5' },
    { num: pct + '%', label: 'Avance general', dot: null }
  ];

  document.getElementById('kpi-bar').innerHTML = kpis.map((k, i) => `
    <div class="kpi-item" onclick="${i===1?"setFilter('Completado', document.querySelectorAll('.filter-btn')[3])":i===2?"setFilter('En desarrollo', document.querySelectorAll('.filter-btn')[4])":i===3?"setFilter('Pendiente', document.querySelectorAll('.filter-btn')[5])":"setFilter('all', document.querySelectorAll('.filter-btn')[0])"}">
      ${k.dot ? `<div class="kpi-dot" style="background:${k.dot}"></div>` : ''}
      <div>
        <div class="kpi-num">${k.num}</div>
        <div class="kpi-label">${k.label}</div>
      </div>
    </div>
  `).join('');
}

function renderAll() {
  renderKPIs();
  const search = document.getElementById('search-input').value.toLowerCase();

  const filtered = data.filter(r => {
    const statusMatch = currentFilter === 'all' || r.status === currentFilter;
    const searchMatch = !search || [r.eje, r.tema, r.accion, r.resp].join(' ').toLowerCase().includes(search);
    return statusMatch && searchMatch;
  });

  const byEje = {};
  EJES_ORDER.forEach(e => { byEje[e] = []; });
  filtered.forEach(r => {
    if (!byEje[r.eje]) byEje[r.eje] = [];
    byEje[r.eje].push(r);
  });

  let html = '';
  EJES_ORDER.forEach(eje => {
    const rows = byEje[eje];
    if (!rows || rows.length === 0) return;
    const color = EJE_COLORS[eje] || '#555';
    const collapsed = collapsedEjes[eje];
    const allRows = data.filter(r => r.eje === eje);
    const done = allRows.filter(r => r.status === 'Completado').length;
    const pct = allRows.length ? Math.round(done / allRows.length * 100) : 0;

    html += `
    <div class="eje-section" id="section-${eje.replace(/\s+/g,'_')}">
      <div class="eje-header" onclick="toggleEje('${eje.replace(/\s+/g,'_')}')">
        <div class="eje-stripe" style="background:${color}"></div>
        <span class="eje-title">${eje}</span>
        <span class="eje-count">${rows.length} acción${rows.length!==1?'es':''}</span>
        <div style="flex:1;max-width:120px">
          <div style="font-size:10px;color:var(--muted);text-align:right">${pct}% completado</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <span class="eje-toggle ${collapsed ? 'collapsed' : ''}">▼</span>
      </div>
      ${collapsed ? '' : `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Tema</th>
              <th>Acción</th>
              <th>Canal</th>
              <th>Fecha</th>
              <th>Responsable</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => {
              const idx = data.indexOf(r);
              const sc = getStatusClass(r.status);
              return `<tr>
                <td>${getTipoBadge(r.tipo)}</td>
                <td class="action-cell" contenteditable="true" class="editable" onblur="updateField(${idx},'tema',this.innerText)">${r.tema}</td>
                <td class="action-cell" contenteditable="true" class="editable" onblur="updateField(${idx},'accion',this.innerText)" style="max-width:260px">${r.accion}</td>
                <td style="font-size:12px;color:var(--muted)">${r.tipoAccion || '—'}</td>
                <td class="date-cell">${formatDate(r.fecha)}</td>
                <td class="resp-cell" contenteditable="true" class="editable" onblur="updateField(${idx},'resp',this.innerText)">${r.resp || '—'}</td>
                <td>
                  <div class="status-wrap ${sc}">
                    <select class="status-select" onchange="updateStatus(${idx}, this.value)">
                      <option ${!r.status?'selected':''} value="">Sin definir</option>
                      <option ${r.status==='Pendiente'?'selected':''} value="Pendiente">Pendiente</option>
                      <option ${r.status==='En desarrollo'?'selected':''} value="En desarrollo">En desarrollo</option>
                      <option ${r.status==='Completado'?'selected':''} value="Completado">Completado</option>
                    </select>
                  </div>
                </td>
                <td><button class="delete-btn" onclick="deleteRow(${idx})" title="Eliminar">✕</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <button class="add-row-btn" onclick="openModalForEje('${eje}')">＋ Agregar acción en ${eje}</button>
      </div>
      `}
    </div>`;
  });

  if (!html) {
    html = `<div class="empty-state">No se encontraron acciones con los filtros seleccionados.</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function toggleEje(ejeKey) {
  const eje = ejeKey.replace(/_/g, ' ');
  collapsedEjes[eje] = !collapsedEjes[eje];
  renderAll();
}

function updateField(idx, field, value) {
  data[idx][field] = value.trim();
  renderKPIs();
}

function updateStatus(idx, value) {
  data[idx].status = value;
  renderAll();
}

function deleteRow(idx) {
  if (confirm('¿Eliminar esta acción?')) {
    data.splice(idx, 1);
    renderAll();
  }
}

// Modal
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-eje').value = 'Orgullo USS';
}

function openModalForEje(eje) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-eje').value = eje;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['f-tema','f-accion','f-fecha','f-resp'].forEach(id => document.getElementById(id).value = '');
}

function addRow() {
  const newRow = {
    eje: document.getElementById('f-eje').value,
    tipo: document.getElementById('f-tipo').value,
    tema: document.getElementById('f-tema').value || 'Nuevo tema',
    accion: document.getElementById('f-accion').value || 'Nueva acción',
    tipoAccion: document.getElementById('f-tipo-accion').value,
    fecha: document.getElementById('f-fecha').value,
    resp: document.getElementById('f-resp').value,
    status: document.getElementById('f-status').value,
  };
  data.push(newRow);
  closeModal();
  renderAll();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Today's date
const now = new Date();
document.getElementById('today-date').textContent = now.toLocaleDateString('es-CL', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

// Init
renderAll();
</script>
